<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KRTK — URL Shortener</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0a0a08;
                --surface: #111110;
                --border: #2a2a26;
                --accent: #e8ff4a;
                --accent2: #ff4a6e;
                --text: #f0ede6;
                --muted: #6b6b60;
                --mono: "IBM Plex Mono", monospace;
                --display: "Bebas Neue", sans-serif;
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--mono);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            header {
                padding: 2rem 3rem;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: baseline;
                gap: 1rem;
            }
            .logo {
                font-family: var(--display);
                font-size: 2.8rem;
                color: var(--accent);
                line-height: 1;
            }
            .tagline {
                font-size: 0.7rem;
                color: var(--muted);
                letter-spacing: 0.15em;
                text-transform: uppercase;
            }
            main {
                flex: 1;
                display: grid;
                place-items: center;
                padding: 3rem 1.5rem;
            }
            .card {
                width: 100%;
                max-width: 640px;
            }
            .card-title {
                font-family: var(--display);
                font-size: clamp(3rem, 10vw, 6rem);
                line-height: 0.9;
                margin-bottom: 2.5rem;
            }
            .card-title span {
                color: var(--accent);
            }
            .input-row {
                display: flex;
                border: 1px solid var(--border);
                background: var(--surface);
                transition: border-color 0.2s;
            }
            .input-row:focus-within {
                border-color: var(--accent);
            }
            input[type="url"] {
                flex: 1;
                background: transparent;
                border: none;
                outline: none;
                padding: 1rem 1.2rem;
                color: var(--text);
                font-family: var(--mono);
                font-size: 0.85rem;
            }
            input[type="url"]::placeholder {
                color: var(--muted);
            }
            button {
                background: var(--accent);
                color: #0a0a08;
                border: none;
                padding: 1rem 1.8rem;
                font-family: var(--display);
                font-size: 1.1rem;
                letter-spacing: 0.12em;
                cursor: pointer;
                transition:
                    background 0.15s,
                    transform 0.1s;
                white-space: nowrap;
            }
            button:hover {
                background: #f5ff70;
            }
            button:active {
                transform: scale(0.97);
            }
            button:disabled {
                background: var(--border);
                color: var(--muted);
                cursor: not-allowed;
            }
            .error-msg {
                margin-top: 0.7rem;
                font-size: 0.75rem;
                color: var(--accent2);
                letter-spacing: 0.05em;
                min-height: 1.2em;
            }
            .result {
                margin-top: 2rem;
                border: 1px solid var(--border);
                background: var(--surface);
                padding: 1.4rem 1.6rem;
                display: none;
                animation: slideIn 0.25s ease;
            }
            .result.visible {
                display: block;
            }
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .result-label {
                font-size: 0.65rem;
                color: var(--muted);
                letter-spacing: 0.2em;
                text-transform: uppercase;
                margin-bottom: 0.6rem;
            }
            .result-url {
                font-size: 1.05rem;
                color: var(--accent);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
                word-break: break-all;
            }
            .copy-btn {
                background: transparent;
                color: var(--muted);
                padding: 0.3rem 0.6rem;
                font-size: 0.7rem;
                border: 1px solid var(--border);
                letter-spacing: 0.1em;
                flex-shrink: 0;
            }
            .copy-btn:hover {
                color: var(--text);
                background: var(--border);
            }
            .copy-btn.copied {
                color: var(--accent);
                border-color: var(--accent);
            }
            .result-original {
                margin-top: 0.8rem;
                font-size: 0.72rem;
                color: var(--muted);
                word-break: break-all;
            }
            footer {
                padding: 1.5rem 3rem;
                border-top: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                font-size: 0.65rem;
                color: var(--muted);
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">KRTK</div>
            <div class="tagline">// URL shortener</div>
        </header>
        <main>
            <div class="card">
                <h1 class="card-title">SHORTEN<br /><span>YOUR LINK.</span></h1>
                <div class="input-row">
                    <input
                        type="url"
                        id="urlInput"
                        placeholder="https://your-very-long-url.com/..."
                    />
                    <button id="shortenBtn" onclick="shorten()">SHORTEN</button>
                </div>
                <div class="error-msg" id="errorMsg"></div>
                <div class="result" id="result">
                    <div class="result-label">// your short link</div>
                    <div class="result-url">
                        <a
                            id="shortUrl"
                            href="#"
                            target="_blank"
                            style="color: inherit; text-decoration: none"
                        ></a>
                        <button
                            class="copy-btn"
                            id="copyBtn"
                            onclick="copyUrl()"
                        >
                            COPY
                        </button>
                    </div>
                    <div class="result-original" id="originalUrl"></div>
                </div>
            </div>
        </main>
        <footer>
            <span>KRTK © 2025</span>
            <span>Flask + SQLite</span>
        </footer>
        <script>
            let lastShortUrl = "";

            async function shorten() {
                const input = document.getElementById("urlInput");
                const errorMsg = document.getElementById("errorMsg");
                const btn = document.getElementById("shortenBtn");
                const result = document.getElementById("result");
                const url = input.value.trim();

                errorMsg.textContent = "";
                result.classList.remove("visible");

                if (!url) {
                    errorMsg.textContent = "→ Please enter a URL";
                    return;
                }
                if (!url.startsWith("http://") && !url.startsWith("https://")) {
                    errorMsg.textContent =
                        "→ URL must start with http:// or https://";
                    return;
                }

                btn.disabled = true;
                btn.textContent = "...";

                try {
                    const res = await fetch("/api/shorten", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ url }),
                    });
                    const data = await res.json();

                    if (!res.ok) {
                        errorMsg.textContent =
                            "→ " + (data.error || "Server error");
                        return;
                    }

                    lastShortUrl = data.short_url;
                    document.getElementById("shortUrl").href = data.short_url;
                    document.getElementById("shortUrl").textContent =
                        data.short_url;
                    document.getElementById("originalUrl").textContent =
                        "↳ " + data.original_url;
                    document.getElementById("copyBtn").textContent = "COPY";
                    document
                        .getElementById("copyBtn")
                        .classList.remove("copied");
                    result.classList.add("visible");
                } catch (e) {
                    errorMsg.textContent = "→ Connection error";
                } finally {
                    btn.disabled = false;
                    btn.textContent = "SHORTEN";
                }
            }

            async function copyUrl() {
                if (!lastShortUrl) return;
                await navigator.clipboard.writeText(lastShortUrl);
                const btn = document.getElementById("copyBtn");
                btn.textContent = "COPIED";
                btn.classList.add("copied");
                setTimeout(() => {
                    btn.textContent = "COPY";
                    btn.classList.remove("copied");
                }, 2000);
            }

            document
                .getElementById("urlInput")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") shorten();
                });
        </script>
    </body>
</html>
